<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimLog Lite · 死斗单局记录</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
    :root {
        --bg: #0f1923;
        --card: #1b2733;
        --red: #ff4655;
        --text: #ece8e1;
        --muted: #7b8a9a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
        max-width: 800px;
        margin: auto;
    }
    h1 { color: var(--red); font-size: 1.8rem; margin-bottom: 20px; }
    .card {
        background: var(--card);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
    }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .space-between { display: flex; justify-content: space-between; align-items: center; }
    button {
        background: var(--red);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }
    button:hover { background: #e03e4a; }
    input {
        background: #2b3a4a;
        border: 1px solid #3d5060;
        color: var(--text);
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        width: 90px;
        text-align: center;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
    .stat-item { text-align: center; }
    .stat-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 5px; }
    .stat-value { font-size: 2rem; font-weight: bold; }
    .streak-badge {
        background: var(--red);
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.9rem;
    }
    .progress-msg { margin-top: 10px; font-size: 0.95rem; }
    canvas { background: #1b2733; border-radius: 8px; margin-top: 10px; }
    /* 热力图 */
    .heatmap { display: flex; flex-direction: column; gap: 6px; }
    .month-row { display: flex; align-items: center; }
    .month-label { width: 35px; font-size: 0.8rem; color: var(--muted); }
    .days { display: flex; flex-wrap: wrap; gap: 3px; }
    .day-cell {
        width: 14px; height: 14px;
        border-radius: 2px;
        background: #2b3a4a;
    }
    .day-cell.today { outline: 2px solid white; }
    /* 响应式 */
    @media (max-width: 600px) {
        .stat-grid { grid-template-columns: 1fr 1fr; }
        input { width: 80px; }
    }
</style>
</head>
<body>
<h1>🎯 AimLog Lite</h1>

<!-- 今日累计卡片 -->
<div class="card">
    <div class="space-between">
        <h2 style="margin:0; font-size:1.3rem;">📊 今日累计</h2>
        <span id="streak" class="streak-badge">🔥 0天</span>
    </div>
    <div style="margin-top:15px;">
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">总局数</div>
                <div class="stat-value" id="todayMatches">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">今日K/D</div>
                <div class="stat-value" id="todayKd">-</div>
            </div>
        </div>
        <div id="goalProgress" class="progress-msg"></div>
    </div>
</div>

<!-- 单局记录卡片 -->
<div class="card">
    <h2 style="font-size:1.3rem; margin-bottom:15px;">✍️ 记录本局</h2>
    <div class="flex" style="justify-content: center; gap: 20px; margin-bottom: 15px;">
        <div style="text-align:center;">
            <div style="color:var(--muted); margin-bottom:5px;">击杀</div>
            <input type="number" id="killInput" value="20" min="0">
        </div>
        <div style="text-align:center;">
            <div style="color:var(--muted); margin-bottom:5px;">死亡</div>
            <input type="number" id="deathInput" value="15" min="0">
        </div>
    </div>
    <button id="addMatchBtn" style="width:100%; padding:14px;">➕ 记录本局</button>
</div>

<!-- 每日目标卡片 -->
<div class="card">
    <h2 style="font-size:1.3rem; margin-bottom:15px;">🎯 每日目标</h2>
    <div class="flex">
        <label>局数 <input type="number" id="goalMatches" value="20" min="1" style="width:70px;"></label>
        <label>最低K/D <input type="number" id="goalKd" value="1.2" step="0.1" style="width:80px;"></label>
        <button onclick="saveGoal()">保存目标</button>
    </div>
</div>

<!-- 趋势图 -->
<div class="card">
    <h2 style="font-size:1.3rem; margin-bottom:10px;">📈 近14天K/D趋势</h2>
    <canvas id="trendChart" height="220"></canvas>
</div>

<!-- 年度热力图 -->
<div class="card">
    <h2 style="font-size:1.3rem; margin-bottom:10px;">📅 年度训练热力图</h2>
    <div id="heatmap" class="heatmap"></div>
</div>

<script>
    // ---------- 数据存储 ----------
    // 每日汇总数据: { date: "2026-05-06", matches: 12, kills: 240, deaths: 180 }
    const DAILY_KEY = 'aimlog_daily';
    const GOAL_KEY = 'aimlog_goal';

    let dailyData = JSON.parse(localStorage.getItem(DAILY_KEY) || '{}');
    let goal = JSON.parse(localStorage.getItem(GOAL_KEY)) || { matches: 20, kd: 1.2 };

    // ---------- 工具函数 ----------
    const todayStr = () => new Date().toISOString().slice(0,10);
    const formatDateShort = (d) => d.slice(5);

    // 获取今日记录（对象）或 null
    function getToday() {
        const t = todayStr();
        return dailyData[t] || null;
    }

    // 保存今日记录
    function saveToday(record) {
        dailyData[todayStr()] = record;
        localStorage.setItem(DAILY_KEY, JSON.stringify(dailyData));
    }

    // 计算K/D
    function calcKD(kills, deaths) {
        if (deaths === 0) return kills;
        return parseFloat((kills / deaths).toFixed(2));
    }

    // 今日统计
    function getTodayStats() {
        const t = getToday();
        if (!t) return { matches: 0, kills: 0, deaths: 0, kd: 0 };
        const { matches, kills, deaths } = t;
        return { matches, kills, deaths, kd: calcKD(kills, deaths) };
    }

    // 连续天数
    function getStreak() {
        const dates = Object.keys(dailyData).sort().reverse();
        const today = todayStr();
        if (dates.length === 0 || dates[0] !== today) return 0;
        let streak = 1;
        for (let i = 1; i < dates.length; i++) {
            const prev = new Date(dates[i-1]);
            const curr = new Date(dates[i]);
            if ((prev - curr) / (1000*60*60*24) === 1) streak++;
            else break;
        }
        return streak;
    }

    // ---------- UI 更新 ----------
    function refreshUI() {
        const stats = getTodayStats();

        document.getElementById('todayMatches').textContent = stats.matches;
        document.getElementById('todayKd').textContent = stats.matches > 0 ? stats.kd : '-';
        document.getElementById('streak').textContent = `🔥 连续${getStreak()}天`;

        // 目标进度文字
        const progressDiv = document.getElementById('goalProgress');
        let msgs = [];
        if (stats.matches < goal.matches) msgs.push(`⚠️ 还差 ${goal.matches - stats.matches} 局`);
        if (stats.matches > 0 && stats.kd < goal.kd) msgs.push(` K/D ${stats.kd} < ${goal.kd}`);
        if (msgs.length === 0 && stats.matches > 0) {
            progressDiv.innerHTML = '✨ 今日目标全部达成！';
        } else if (stats.matches === 0) {
            progressDiv.innerHTML = '📝 今天还没记录，打完一局就录入吧';
        } else {
            progressDiv.innerHTML = msgs.join(' · ');
        }

        // 回填目标输入框
        document.getElementById('goalMatches').value = goal.matches;
        document.getElementById('goalKd').value = goal.kd;

        drawTrend();
        drawHeatmap();
    }

    // 添加一局
    function addMatch() {
        const kills = parseInt(document.getElementById('killInput').value) || 0;
        const deaths = parseInt(document.getElementById('deathInput').value) || 0;

        if (kills === 0 && deaths === 0) {
            alert('请至少输入击杀或死亡数');
            return;
        }

        const todayRec = getToday() || { matches: 0, kills: 0, deaths: 0 };
        todayRec.matches += 1;
        todayRec.kills += kills;
        todayRec.deaths += deaths;
        saveToday(todayRec);
        refreshUI();
        checkGoalNotification();
    }

    // 保存目标
    function saveGoal() {
        goal.matches = parseInt(document.getElementById('goalMatches').value) || 20;
        goal.kd = parseFloat(document.getElementById('goalKd').value) || 1.2;
        localStorage.setItem(GOAL_KEY, JSON.stringify(goal));
        refreshUI();
    }

    // 目标达成通知
    function checkGoalNotification() {
        if (!("Notification" in window)) return;
        const stats = getTodayStats();
        if (stats.matches === 0) return;
        const allDone = stats.matches >= goal.matches && stats.kd >= goal.kd;
        if (allDone && Notification.permission === "granted") {
            new Notification("🎉 恭喜！今日死斗目标全部达成！", {
                body: `总局数 ${stats.matches}，K/D ${stats.kd}`,
            });
        }
    }

    // 请求通知权限
    if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
    }

    // ---------- 趋势图 ----------
    let trendChart;
    function drawTrend() {
        const days = 14;
        const today = new Date();
        const labels = [], kdData = [];
        for (let i = days-1; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0,10);
            const rec = dailyData[dateStr];
            const kd = rec ? calcKD(rec.kills, rec.deaths) : null;
            labels.push(formatDateShort(dateStr));
            kdData.push(kd);
        }

        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'K/D',
                    data: kdData,
                    borderColor: '#ff4655',
                    backgroundColor: 'rgba(255,70,85,0.1)',
                    tension: 0.2,
                    spanGaps: false,
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { min: 0, title: { display: true, text: 'K/D', color: '#ff4655' } }
                }
            }
        });
    }

    // ---------- 热力图 ----------
    function drawHeatmap() {
        const container = document.getElementById('heatmap');
        container.innerHTML = '';
        const year = new Date().getFullYear();
        const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const today = todayStr();

        for (let m = 0; m < 12; m++) {
            const monthDiv = document.createElement('div');
            monthDiv.className = 'month-row';
            const label = document.createElement('span');
            label.className = 'month-label';
            label.textContent = months[m];
            monthDiv.appendChild(label);

            const daysDiv = document.createElement('div');
            daysDiv.className = 'days';
            const daysInMonth = new Date(year, m+1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const rec = dailyData[dateStr];
                const matches = rec ? rec.matches : 0;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (matches > 0) {
                    const intensity = Math.min(matches / 10, 1);
                    cell.style.backgroundColor = `rgba(255,70,85,${0.2 + intensity * 0.8})`;
                }
                if (dateStr === today) cell.classList.add('today');
                cell.title = `${dateStr}: ${matches}局`;
                daysDiv.appendChild(cell);
            }
            monthDiv.appendChild(daysDiv);
            container.appendChild(monthDiv);
        }
    }

    // 绑定添加按钮
    document.getElementById('addMatchBtn').addEventListener('click', addMatch);

    // 初始渲染
    refreshUI();
</script>
</body>
</html>
