<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>死斗打卡</title>
  <meta name="theme-color" content="#0f1923">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="死斗打卡">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' rx='6' fill='%230f1923'/><text x='16' y='22' font-size='20' text-anchor='middle' fill='%23ff4655'>🎯</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0f1923;
      --card: #1b2733;
      --red: #ff4655;
      --text: #ece8e1;
      --muted: #7b8a9a;
      --nav-height: 56px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: var(--nav-height);
      max-width: 500px;
      margin: auto;
      min-height: 100vh;
    }
    .header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid #2b3a4a;
    }
    .header h1 { font-size: 1.4rem; color: var(--red); }
    .streak {
      background: var(--red);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .stat-row { display: flex; justify-content: space-around; margin: 10px 0; }
    .stat-item { text-align: center; }
    .stat-label { font-size: 0.85rem; color: var(--muted); }
    .stat-value { font-size: 2rem; font-weight: bold; }
    button {
      background: var(--red);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    button.secondary { background: #2b3a4a; }
    input {
      background: #2b3a4a;
      border: 1px solid #3d5060;
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      width: 80px;
    }
    input[type="number"]::-webkit-inner-spin-button { opacity: 1; height: 28px; }
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      display: flex;
      background: #1b2733;
      border-top: 1px solid #2b3a4a;
      height: var(--nav-height);
    }
    .nav-btn {
      flex: 1;
      background: transparent;
      color: var(--muted);
      font-size: 1rem;
      font-weight: bold;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .nav-btn.active { color: var(--red); }
    .calendar { margin-bottom: 14px; }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 4px; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.9rem;
      position: relative;
      background: #2b3a4a;
      cursor: pointer;
    }
    .day-cell.selected { outline: 2px solid var(--red); }
    .day-cell.today { background: #3d5060; }
    .day-cell.has-record::after {
      content: '';
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      position: absolute;
      bottom: 4px;
    }
    .match-list { max-height: 300px; overflow-y: auto; }
    .match-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2b3a4a;
    }
    .match-item:last-child { border-bottom: none; }
    .day-summary { margin-top: 10px; color: var(--muted); font-size: 0.9rem; }
    canvas { width: 100% !important; height: auto !important; }
    .heatmap { display: flex; flex-direction: column; gap: 4px; }
    .month-row { display: flex; align-items: center; }
    .month-label { width: 35px; font-size: 0.75rem; color: var(--muted); }
    .days { display: flex; flex-wrap: wrap; gap: 2px; }
    .hcell {
      width: 12px; height: 12px;
      border-radius: 2px;
      background: #2b3a4a;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 死斗打卡</h1>
    <span id="streak" class="streak">🔥 0天</span>
  </div>

  <!-- 打卡页 -->
  <div id="page-log" class="page active">
    <div class="card">
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-label">今日局数</div>
          <div class="stat-value" id="todayCount">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">今日K/D</div>
          <div class="stat-value" id="todayKd">-</div>
        </div>
      </div>
      <div id="goalProgress" style="font-size:0.9rem; margin-top:10px;"></div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:10px;">✍️ 记录本局</h3>
      <div class="flex" style="justify-content:center; margin-bottom:12px;">
        <input type="number" id="killInput" value="20" min="0" placeholder="击杀">
        <input type="number" id="deathInput" value="15" min="0" placeholder="死亡">
      </div>
      <button id="saveMatchBtn">➕ 记录本局</button>
    </div>
    <div class="card">
      <h3 style="margin-bottom:10px;">🎯 每日目标</h3>
      <div class="flex">
        <input type="number" id="goalMatches" value="20" min="1" style="width:70px;"> 局
        <input type="number" id="goalKd" value="1.2" step="0.1" style="width:80px;"> K/D
        <button class="secondary" onclick="saveGoal()" style="width:auto; padding:10px 16px;">保存目标</button>
      </div>
    </div>
    <div class="card">
      <h3>📈 近14天K/D</h3>
      <canvas id="trendChart" height="180"></canvas>
    </div>
    <div class="card">
      <h3>📅 年度热力图</h3>
      <div id="heatmap" class="heatmap"></div>
    </div>
  </div>

  <!-- 历史页 -->
  <div id="page-history" class="page">
    <div class="card calendar">
      <div class="calendar-header">
        <button onclick="changeMonth(-1)" style="width:auto; background:#2b3a4a; padding:6px 12px;">◀</button>
        <span id="currentMonthLabel" style="font-weight:bold;"></span>
        <button onclick="changeMonth(1)" style="width:auto; background:#2b3a4a; padding:6px 12px;">▶</button>
      </div>
      <div class="weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div id="calendarGrid" class="days-grid"></div>
    </div>
    <div class="card">
      <h3 id="selectedDateTitle">选择日期查看详情</h3>
      <div id="matchList" class="match-list"></div>
      <div id="daySummary" class="day-summary"></div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="nav">
    <button class="nav-btn active" onclick="switchPage('log')">🎯 打卡</button>
    <button class="nav-btn" onclick="switchPage('history')">📅 历史</button>
  </div>

  <script>
    // ================= 数据存储 =================
    const STORAGE = 'dm_matches';
    const GOAL_STORAGE = 'dm_goal';
    let matches = JSON.parse(localStorage.getItem(STORAGE) || '[]');
    let goal = JSON.parse(localStorage.getItem(GOAL_STORAGE)) || { matches: 20, kd: 1.2 };

    const todayStr = () => new Date().toISOString().slice(0,10);

    function saveData() { localStorage.setItem(STORAGE, JSON.stringify(matches)); }
    function saveGoal() {
      goal.matches = parseInt(document.getElementById('goalMatches').value) || 20;
      goal.kd = parseFloat(document.getElementById('goalKd').value) || 1.2;
      localStorage.setItem(GOAL_STORAGE, JSON.stringify(goal));
      refreshLogPage();
    }

    // ================= 页面切换 =================
    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.nav-btn:nth-child(${page === 'log' ? 1 : 2})`).classList.add('active');
      if (page === 'log') refreshLogPage();
      if (page === 'history') refreshHistoryPage();
    }

    // ================= 打卡页逻辑 =================
    function getTodayMatches() {
      return matches.filter(m => m.date === todayStr());
    }

    function refreshLogPage() {
      const todayMatches = getTodayMatches();
      const count = todayMatches.length;
      const kills = todayMatches.reduce((s,m)=>s+m.kills, 0);
      const deaths = todayMatches.reduce((s,m)=>s+m.deaths, 0);
      const kd = deaths > 0 ? (kills/deaths).toFixed(2) : kills;

      document.getElementById('todayCount').textContent = count;
      document.getElementById('todayKd').textContent = count ? kd : '-';
      document.getElementById('streak').textContent = `🔥 连续${getStreak()}天`;

      const progress = document.getElementById('goalProgress');
      let msgs = [];
      if (count < goal.matches) msgs.push(`⚠️ 还差 ${goal.matches - count} 局`);
      if (count && parseFloat(kd) < goal.kd) msgs.push(`K/D ${kd} 低于目标`);
      if (msgs.length === 0 && count) msgs.push('✨ 今日目标达成！');
      else if (!count) msgs.push('📝 今天还没记录');
      progress.textContent = msgs.join(' · ');

      document.getElementById('goalMatches').value = goal.matches;
      document.getElementById('goalKd').value = goal.kd;

      drawTrend();
      drawHeatmap();
    }

    function addMatch() {
      const kills = parseInt(document.getElementById('killInput').value) || 0;
      const deaths = parseInt(document.getElementById('deathInput').value) || 0;
      matches.push({ date: todayStr(), kills, deaths });
      saveData();
      refreshLogPage();
      checkGoalNotification();
    }

    function getStreak() {
      const uniqueDates = [...new Set(matches.map(m=>m.date))].sort().reverse();
      if (!uniqueDates.length || uniqueDates[0] !== todayStr()) return 0;
      let s = 1;
      for (let i=1; i<uniqueDates.length; i++) {
        const diff = (new Date(uniqueDates[i-1]) - new Date(uniqueDates[i])) / 86400000;
        if (diff === 1) s++;
        else break;
      }
      return s;
    }

    function checkGoalNotification() {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const t = getTodayMatches();
      const kills = t.reduce((s,m)=>s+m.kills,0);
      const deaths = t.reduce((s,m)=>s+m.deaths,0);
      const kd = deaths ? kills/deaths : kills;
      if (t.length >= goal.matches && kd >= goal.kd) {
        new Notification("🎉 今日死斗目标达成！", { body: `${t.length}局 · K/D ${kd.toFixed(2)}` });
      }
    }

    // 趋势图
    let trendChart;
    function drawTrend() {
      const days = 14, today = new Date();
      const labels = [], kdArr = [];
      for (let i=days-1; i>=0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate()-i);
        const ds = d.toISOString().slice(0,10);
        const dayMatches = matches.filter(m=>m.date===ds);
        const kills = dayMatches.reduce((s,m)=>s+m.kills,0);
        const deaths = dayMatches.reduce((s,m)=>s+m.deaths,0);
        labels.push(`${d.getMonth()+1}/${d.getDate()}`);
        kdArr.push(deaths ? kills/deaths : (kills || null));
      }
      const ctx = document.getElementById('trendChart').getContext('2d');
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{ label:'K/D', data:kdArr, borderColor:'#ff4655', tension:0.2, spanGaps:false }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          scales: { y: { min:0, title:{display:true,text:'K/D'} } }
        }
      });
    }

    // 热力图
    function drawHeatmap() {
      const container = document.getElementById('heatmap');
      container.innerHTML = '';
      const year = new Date().getFullYear();
      const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      for (let m=0; m<12; m++) {
        const row = document.createElement('div'); row.className='month-row';
        const label = document.createElement('span'); label.className='month-label'; label.textContent=months[m];
        row.appendChild(label);
        const daysDiv = document.createElement('div'); daysDiv.className='days';
        const dim = new Date(year, m+1, 0).getDate();
        for (let d=1; d<=dim; d++) {
          const ds = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const cnt = matches.filter(m=>m.date===ds).length;
          const cell = document.createElement('div'); cell.className='hcell';
          if (cnt>0) cell.style.backgroundColor = `rgba(255,70,85,${0.3+cnt*0.08})`;
          if (ds===todayStr()) cell.style.outline='2px solid white';
          cell.title = `${ds}: ${cnt}局`;
          daysDiv.appendChild(cell);
        }
        row.appendChild(daysDiv);
        container.appendChild(row);
      }
    }

    // ================= 历史页逻辑 =================
    let calYear, calMonth, selectedDate = todayStr();
    (function initCalendar() {
      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
    })();

    function renderCalendar() {
      document.getElementById('currentMonthLabel').textContent = `${calYear}年 ${calMonth+1}月`;
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
      for (let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
      for (let d=1; d<=daysInMonth; d++) {
        const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.textContent = d;
        if (ds === todayStr()) cell.classList.add('today');
        if (ds === selectedDate) cell.classList.add('selected');
        if (matches.some(m=>m.date===ds)) cell.classList.add('has-record');
        cell.onclick = () => { selectedDate = ds; renderCalendar(); showDateDetail(); };
        grid.appendChild(cell);
      }
    }

    function showDateDetail() {
      document.getElementById('selectedDateTitle').textContent = `📋 ${selectedDate}`;
      const dayMatches = matches.filter(m=>m.date===selectedDate);
      const list = document.getElementById('matchList');
      if (!dayMatches.length) {
        list.innerHTML = '<div style="color:var(--muted); padding:20px 0; text-align:center;">当天无记录</div>';
        document.getElementById('daySummary').textContent = '';
        return;
      }
      list.innerHTML = dayMatches.map((m,i) => `
        <div class="match-item">
          <span>第${i+1}局</span>
          <span>${m.kills}杀 / ${m.deaths}死</span>
          <span>K/D ${m.deaths ? (m.kills/m.deaths).toFixed(2) : m.kills}</span>
        </div>
      `).join('');
      const kills = dayMatches.reduce((s,m)=>s+m.kills,0);
      const deaths = dayMatches.reduce((s,m)=>s+m.deaths,0);
      document.getElementById('daySummary').textContent = 
        `当日总计: ${kills}杀 ${deaths}死 · K/D ${deaths ? (kills/deaths).toFixed(2) : kills}`;
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      else if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
      selectedDate = `${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
      showDateDetail();
    }

    function refreshHistoryPage() {
      renderCalendar();
      showDateDetail();
    }

    // 初始化
    document.getElementById('saveMatchBtn').addEventListener('click', addMatch);
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

    // 动态生成 manifest 实现完整 PWA 安装体验
    (function() {
      const manifest = {
        name: '死斗打卡',
        short_name: '死斗打卡',
        start_url: location.href,
        display: 'standalone',
        background_color: '#0f1923',
        theme_color: '#0f1923',
        icons: [{
          src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192"><rect width="192" height="192" rx="32" fill="#0f1923"/><text x="96" y="110" font-size="100" text-anchor="middle" fill="#ff4655">🎯</text></svg>'),
          sizes: '192x192',
          type: 'image/svg+xml'
        }]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    })();

    refreshLogPage();
  </script>
</body>
</html>
